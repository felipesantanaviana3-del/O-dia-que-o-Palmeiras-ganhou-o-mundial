<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dia do Mundial do Palmeiras</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #006437 0%, #1DB954 100%);
      text-align: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      width: 90%;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #006437;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    button {
      background-color: #006437; /* Verde Palmeiras */
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 15px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background-color: #004d2a;
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.98);
    }

    /* Esconde o vídeo no início */
    #area-video {
      display: none;
      margin-top: 25px;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* Proporção 16:9 */
      height: 0;
      overflow: hidden;
      border-radius: 8px;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .emoji {
      font-size: 40px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="emoji">🏆⚽🟢</div>
    <h1>Dia do Mundial do Palmeiras</h1>
    <p class="subtitle">Clique no botão para reviver este momento histórico!</p>
    
    <button id="btnRevelar" onclick="mostrarVideo()">
      Clica aqui pra ver o dia que o palmeiras ganhou o mundial
    </button>

    <div id="area-video">
      <div class="video-wrapper">
        <iframe 
          id="iframeVideo" 
          src="" 
          title="Palmeiras Mundial" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>

  <script>
    function mostrarVideo() {
      // 1. Esconde o botão após o clique
      document.getElementById('btnRevelar').style.display = 'none';

      // 2. Link do vídeo convertido para embed
      const linkDoVideo = "https://www.youtube.com/embed/nLUpLtXzOHg?autoplay=1"; 

      // 3. Insere a URL no iframe e exibe o container do vídeo
      document.getElementById('iframeVideo').src = linkDoVideo;
      document.getElementById('area-video').style.display = 'block';
    }
  </script>

</body>
</html>
