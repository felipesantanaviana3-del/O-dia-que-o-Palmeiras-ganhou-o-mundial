<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dia do Mundial do Palmeiras</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f4f4f9;
      text-align: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      width: 90%;
    }

    h1 {
      color: #006437;
      margin-bottom: 20px;
    }

    button {
      background-color: #006437;
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 15px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #004d2a;
    }

    #area-video {
      display: none;
      margin-top: 25px;
    }

    video {
      width: 100%;
      max-width: 500px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .erro {
      color: red;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🌴 Dia do Mundial do Palmeiras 🌴</h1>
    
    <button id="btnRevelar" onclick="mostrarVideo()">
      Clica aqui pra ver o dia que o palmeiras ganhou o mundial
    </button>

    <div id="area-video">
      <video id="meuVideo" controls preload="metadata">
        <source src="meu-video.mp4" type="video/mp4">
        Seu navegador não suporta a exibição deste vídeo.
      </video>
      <p class="erro" id="erroVideo">⚠️ Erro ao carregar o vídeo. Verifique se o arquivo existe.</p>
    </div>
  </div>

  <script>
    function mostrarVideo() {
      document.getElementById('btnRevelar').style.display = 'none';
      const areaVideo = document.getElementById('area-video');
      areaVideo.style.display = 'block';

      const video = document.getElementById('meuVideo');
      
      // Trata erro ao carregar vídeo
      video.onerror = function() {
        document.getElementById('erroVideo').style.display = 'block';
      };
      
      video.play();
    }
  </script>

</body>
</html>
