<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dia do Mundial do Palmeiras</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #006437 0%, #004d2a 50%, #003d20 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Efeito de confete de fundo */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 1px, transparent 1px),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 1px, transparent 1px),
        radial-gradient(circle at 40% 60%, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 50px 50px, 80px 80px, 100px 100px;
      pointer-events: none;
      z-index: -1;
    }

    .container {
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 
                  0 0 40px rgba(0, 100, 55, 0.2);
      max-width: 700px;
      width: 100%;
      animation: slideUp 0.6s ease-out;
      border: 3px solid #006437;
      position: relative;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 80px;
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      color: #006437;
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 100, 55, 0.1);
      font-weight: 800;
    }

    .subtitle {
      color: #666;
      font-size: 1.1em;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .date-info {
      color: #006437;
      font-size: 0.95em;
      font-weight: 600;
      margin-top: 10px;
    }

    .button-container {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    button {
      background: linear-gradient(135deg, #006437 0%, #004d2a 100%);
      color: white;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 40px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 100, 55, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transition: left 0.3s ease;
      z-index: -1;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      background: linear-gradient(135deg, #004d2a 0%, #003d20 100%);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 100, 55, 0.4);
    }

    button:active {
      transform: translateY(-1px);
    }

    button i {
      font-size: 1.3em;
    }

    #area-video {
      display: none;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 15px;
    }

    .erro {
      color: #d32f2f;
      background-color: #ffebee;
      margin-top: 20px;
      padding: 15px 20px;
      border-radius: 10px;
      display: none;
      border-left: 4px solid #d32f2f;
      font-weight: 500;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #e0e0e0;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 2em;
      color: #006437;
      font-weight: 800;
    }

    .stat-label {
      color: #666;
      font-size: 0.9em;
      margin-top: 5px;
    }

    /* Responsivo */
    @media (max-width: 600px) {
      .container {
        padding: 30px 20px;
        border-radius: 15px;
      }

      h1 {
        font-size: 2em;
      }

      .logo {
        font-size: 60px;
      }

      button {
        font-size: 16px;
        padding: 15px 30px;
      }

      .stats {
        grid-template-columns: 1fr;
        gap: 10px;
      }
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #006437;
      animation: load 1.4s infinite ease-in-out both;
      margin-right: 5px;
    }

    @keyframes load {
      0%, 80%, 100% {
        opacity: 0.3;
        transform: scale(0);
      }
      40% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="logo">🏆</div>
      <h1>PALMEIRAS CAMPEÃO</h1>
      <p class="subtitle">Tricampeão Mundial</p>
      <p class="date-info">Reviva este momento épico!</p>
    </div>

    <div class="button-container">
      <button id="btnRevelar" onclick="mostrarVideo()">
        <i class="fas fa-play-circle"></i>
        ASSISTIR AGORA
      </button>
    </div>

    <div id="area-video">
      <div class="video-wrapper">
        <video id="meuVideo" controls preload="metadata">
          <source src="meu-video.mp4" type="video/mp4">
          Seu navegador não suporta a exibição deste vídeo.
        </video>
      </div>
      <p class="erro" id="erroVideo">
        <i class="fas fa-exclamation-triangle"></i>
        Erro ao carregar o vídeo. Verifique se o arquivo existe.
      </p>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-number">3</div>
        <div class="stat-label">Títulos Mundiais</div>
      </div>
      <div class="stat">
        <div class="stat-number">26</div>
        <div class="stat-label">Campeonatos Paulistas</div>
      </div>
      <div class="stat">
        <div class="stat-number">∞</div>
        <div class="stat-label">Glória</div>
      </div>
    </div>
  </div>

  <script>
    function mostrarVideo() {
      document.getElementById('btnRevelar').style.display = 'none';
      const areaVideo = document.getElementById('area-video');
      areaVideo.style.display = 'block';

      const video = document.getElementById('meuVideo');
      
      // Trata erro ao carregar vídeo
      video.onerror = function() {
        document.getElementById('erroVideo').style.display = 'block';
      };
      
      // Aguarda um pouco antes de tocar (garante carregamento)
      setTimeout(() => {
        video.play().catch(err => {
          console.log('Erro ao reproduzir:', err);
        });
      }, 100);
    }

    // Som ao clicar (opcional - descomente se quiser)
    // document.getElementById('btnRevelar').addEventListener('click', function() {
    //   new Audio('data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==').play();
    // });
  </script>

</body>
</html>
