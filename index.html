<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Aniversário, Pai!</title>
  <style>
    /* Estilo Geral e Fundo Azul */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #1ea1ff 0%, #0d7ec8 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    /* ANIMAÇÃO DE CONFETE CAINDO */
    @keyframes confetti-fall {
      0% {
        transform: translateY(-10vh) rotateZ(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotateZ(360deg);
        opacity: 0;
      }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background-color: #FFD700;
      pointer-events: none;
      z-index: 1;
    }

    /* ANIMAÇÃO DO BOTÃO COM PULSO */
    @keyframes pulse-button {
      0% {
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      50% {
        box-shadow: 0 4px 25px rgba(255, 215, 0, 0.5);
      }
      100% {
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
    }

    /* ANIMAÇÃO DE ENTRADA SUAVE */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ANIMAÇÃO DE BALANÇO */
    @keyframes swing {
      0%, 100% {
        transform: rotate(-2deg);
      }
      50% {
        transform: rotate(2deg);
      }
    }

    /* ANIMAÇÃO DE BRILHO */
    @keyframes shine {
      0%, 100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }

    .polaroid-wrapper {
      position: relative;
      margin-top: 20px;
      margin-bottom: 30px;
      animation: fadeInUp 0.8s ease-out;
    }

      background-color: #ffffff;
      padding: 20px 20px 50px 20px;
